const priceLabel=`기준 ${p.price}`;
return `<details><summary><img class="thumb" src="${p.img}" alt="${p.name} 대표사진" loading="lazy"><div class="head"><div class="title-row"><h3>${p.name}</h3><a class="room-link" href="${p.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">링크 : ${p.url}</a></div><p class="feature">${p.feature}</p><div class="meta"><span class="price">${priceLabel}</span><span>${p.people}</span><span>객실 ${p.room.split(' ')[0]}</span><span>욕실 ${p.bath}</span></div></div><div class="chev" aria-hidden="true"></div></summary><div class="detail"><div class="grid"><div class="kv"><small>기준요금</small><b>${priceLabel}</b></div><div class="kv"><small>기준/최대</small><b>${p.people}</b></div><div class="kv"><small>객실</small><b>${p.room}</b></div><div class="kv"><small>욕실/층수</small><b>${p.bath} / ${p.floor}</b></div></div><div class="cols"><div class="box"><h4>시설</h4><ul>${p.fac.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="box"><h4>추가요금/특이사항</h4><ul>${p.extra.map(x=>`<li>${x}</li>`).join('')}</ul></div></div></div></details>`;
}).join('');
</script>
</body>
</html>
