<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>🏡 단체 여행 숙소 비교</title>
  <meta name="description" content="10개 숙소의 기준가격, 인원, 객실, 욕실, 시설, 추가요금을 한눈에 비교해보세요." />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="🏡 단체 여행 숙소 비교" />
  <meta property="og:description" content="10개 숙소의 기준가격, 인원, 객실, 욕실, 시설, 추가요금을 한눈에 비교해보세요." />
  <meta property="og:url" content="https://soobeenkim9.github.io/pension-comparison/" />
  <meta property="og:image" content="https://soobeenkim9.github.io/pension-comparison/og-image.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="🏡 단체 여행 숙소 비교" />
  <meta name="twitter:description" content="10개 숙소의 기준가격, 인원, 객실, 욕실, 시설, 추가요금을 한눈에 비교해보세요." />
  <meta name="twitter:image" content="https://soobeenkim9.github.io/pension-comparison/og-image.png" />

  <style>
    :root{
      --bg:#f6f2eb;
      --card:#fffaf3;
      --ink:#2f2923;
      --muted:#766b60;
      --accent:#8b4e2c;
      --line:#eadfce;
      --radius:24px;
      --shadow:0 14px 34px rgba(70,50,30,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",Segoe UI,sans-serif;
      background:linear-gradient(180deg,#fbf7f0 0%,var(--bg) 42%,#f3eee6 100%);
      color:var(--ink);
      line-height:1.55;
    }
    .wrap{max-width:980px;margin:0 auto;padding:0 18px}
    header{
      padding:34px 0 22px;
      border-bottom:1px solid var(--line);
      background:radial-gradient(circle at top left,#fff7df 0,#fbf7f0 36%,#f6f2eb 100%);
    }
    .eyebrow{font-size:13px;font-weight:800;color:var(--accent);letter-spacing:.08em}
    h1{font-size:34px;line-height:1.15;margin:6px 0 10px;font-weight:900;letter-spacing:-.04em}
    .subtitle{margin:0;color:var(--muted);font-size:15px}
    .common{
      margin-top:18px;
      background:rgba(255,255,255,.78);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 16px;
      box-shadow:0 8px 22px rgba(54,42,28,.05);
      font-size:14px;
    }
    .common strong{display:block;margin-bottom:5px;color:#4a3b2e}
    .common span{display:block;color:var(--muted);margin:2px 0}
    main{padding:24px 0 60px}
    .section-title{display:flex;align-items:end;justify-content:space-between;margin:0 0 14px}
    .section-title h2{font-size:20px;margin:0;font-weight:900;letter-spacing:-.03em}
    .count{font-size:13px;color:var(--muted)}
    .list{display:grid;gap:20px}
    details{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
    }
    details:hover{transform:translateY(-1px);box-shadow:0 18px 38px rgba(70,50,30,.13)}
    details[open]{background:#fffdf8}
    summary{
      list-style:none;
      cursor:pointer;
      display:grid;
      grid-template-columns:96px 1fr auto;
      gap:14px;
      align-items:center;
      padding:16px;
      min-height:120px;
    }
    summary::-webkit-details-marker{display:none}
    .thumb{width:96px;height:88px;border-radius:18px;object-fit:cover;background:#e8ded2;border:1px solid var(--line)}
    .title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 4px}
    .head h3{margin:0;font-size:21px;letter-spacing:-.04em}
    .room-link{
      font-size:12px;
      font-weight:800;
      color:var(--accent);
      text-decoration:none;
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:3px 8px;
      max-width:100%;
      word-break:break-all;
    }
    .room-link:hover{text-decoration:underline;background:#f7efe4}
    .feature{margin:0 0 8px;color:var(--muted);font-size:14px}
    .meta{display:flex;flex-wrap:wrap;gap:7px}
    .meta span{font-size:13px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 8px;color:#4f463d}
    .price{font-weight:900;color:#8b4e2c}
    .chev{
      width:28px;height:28px;display:grid;place-items:center;color:var(--muted);
      font-size:24px;font-weight:900;line-height:1;transition:transform .22s ease,color .2s ease;
    }
    .chev::before{content:'⌄'}
    details[open] .chev{color:var(--accent);transform:rotate(180deg)}
    .detail{
      border-top:1px solid var(--line);
      background:#fffdf9;
      padding:16px;
      display:grid;
      gap:14px;
      animation:slideDown .22s ease both;
    }
    @keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .kv{background:#fff;border:1px solid var(--line);border-radius:16px;padding:11px}
    .kv small{display:block;color:var(--muted);font-size:12px;margin-bottom:3px}
    .kv b{font-size:15px}
    .cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .box{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}
    .box h4{margin:0 0 8px;color:#4c4034;font-size:15px}
    .box ul{margin:0;padding-left:19px}
    .box li{margin:4px 0}
    .note{margin:22px 0 0;color:var(--muted);font-size:12px;text-align:center}
    footer{text-align:center;color:var(--muted);font-size:12px;padding:20px 0;border-top:1px solid var(--line)}
    @media(max-width:720px){
      .wrap{padding:0 14px}
      header{padding:28px 0 18px}
      h1{font-size:28px}
      main{padding:20px 0 56px}
      .section-title{margin-bottom:14px}
      .list{gap:18px}
      details{border-radius:22px}
      summary{
        grid-template-columns:76px minmax(0,1fr) 24px;
        gap:12px;
        padding:14px;
        min-height:auto;
        align-items:center;
      }
      .thumb{width:76px;height:76px;border-radius:15px;align-self:center}
      .title-row{
        display:flex;
        flex-direction:column;
        align-items:flex-start;
        gap:5px;
        margin-bottom:6px;
      }
      .head{min-width:0;text-align:left}
      .head h3{font-size:20px;line-height:1.18;text-align:left}
      .room-link{
        display:inline-block;
        max-width:100%;
        font-size:11px;
        line-height:1.25;
        padding:3px 8px;
        overflow-wrap:anywhere;
        word-break:break-word;
      }
      .feature{font-size:13px;line-height:1.35;margin-bottom:8px;text-align:left}
      .meta{gap:6px}
      .meta span{font-size:12px;line-height:1.2;padding:5px 8px}
      .chev{width:24px;height:24px;font-size:22px;align-self:center;justify-self:end}
      .detail{padding:14px}
      .grid{grid-template-columns:repeat(2,1fr)}
      .cols{grid-template-columns:1fr}
    }
    @media(max-width:380px){
      summary{grid-template-columns:70px minmax(0,1fr) 22px;gap:10px;padding:12px}
      .thumb{width:70px;height:70px;border-radius:14px}
      .head h3{font-size:19px}
      .room-link{font-size:10.5px}
      .meta span{font-size:11.5px;padding:4px 7px}
    }
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="eyebrow">1박 단체 여행 후보</div>
    <h1>🏡 단체 여행 숙소 비교</h1>
    <p class="subtitle">펜션 리스트를 먼저 보고, 숙소를 누르면 상세 정보가 펼쳐집니다.</p>
    <div class="common">
      <strong>공통사항</strong>
      <span>기준인원 초과 : 1인 2만원</span>
      <span>24개월 미만 무료</span>
      <span>대부분 실내 온수풀 이용료 10만원 (블루블랑 15만원)</span>
    </div>
  </div>
</header>
<main>
  <div class="wrap">
    <div class="section-title"><h2>펜션 리스트</h2><div class="count">총 10개 숙소</div></div>
    <div class="list" id="list"></div>
    <p class="note">※ 기준가격 외에 온수풀, 바베큐 등 부대시설 이용료가 추가될 수 있습니다. 실제 예약 시 최종 금액은 숙소 페이지에서 확인해주세요.</p>
  </div>
</main>
<footer>단체 여행 숙소 비교 페이지</footer>
<script>
const pensions=[
{name:'더끌림',url:'https://goldenvalley.co.kr/rooms/P285114',price:'85만원',people:'15~25명',room:'5개 (침대2, 온돌3)',bath:'3개',floor:'2층',feature:'가성비가 좋고 놀거리가 다양한 숙소',img:'https://goldenvalley.co.kr/_next/image?q=75&url=https%3A%2F%2Fassets.goldenvalley.co.kr%2Fpensions%2Fe767302d-7136-42e5-beab-39f5b44c3cbd.jpg&w=3840',fac:['실내온수풀','노래방','빔프로젝터','오락기','전용 족구장','트램펄린'],extra:['온수풀 10만원','바베큐 이용료 안내 없음']},
{name:'그랑비치',url:'https://goldenvalley.co.kr/rooms/P081192',price:'115만원',people:'15~30명',room:'6개 (침대2, 온돌4)',bath:'5개',floor:'3층',feature:'최대 30명, 객실과 욕실이 가장 여유로운 숙소',img:'https://goldenvalley.co.kr/_next/image?q=75&url=https%3A%2F%2Fassets.goldenvalley.co.kr%2Fpensions%2Fc8537456-c9e6-4b11-9456-9fa0f6766040.jpg&w=3840',fac:['실내온수풀','공용 족구장'],extra:['온수풀 10만원','바베큐 3만원','족구장 3만원(1시간)']},
{name:'썬샤인키즈',url:'https://goldenvalley.co.kr/rooms/P491114',price:'100만원',people:'15~23명',room:'5개 (패밀리침대5)',bath:'3개',floor:'2층',feature:'아이들과 가기 좋은 키즈 특화 숙소',img:'https://goldenvalley.co.kr/_next/image?q=75&url=https%3A%2F%2Fassets.goldenvalley.co.kr%2Fpensions%2F5d817ef6-cd52-4d90-b0c1-8eeaff9a84ac.jpg&w=3840',fac:['실내온수풀','영화관룸(대형스크린)','키즈시설','인형뽑기','불멍존'],extra:['온수풀 10만원','인형뽑기 유료','바베큐 이용료 안내 없음']},
{name:'청춘펜션',url:'https://goldenvalley.co.kr/rooms/P121616',price:'100만원',people:'15~30명',room:'5개 (침대2, 온돌3)',bath:'3개',floor:'2층',feature:'풋살장과 노래방 이용이 가능한 숙소',img:'https://goldenvalley.co.kr/_next/image?q=75&url=https%3A%2F%2Fassets.goldenvalley.co.kr%2Fpensions%2F17ae7e33-1a1b-4605-ba0b-b69536430560.jpg&w=3840',fac:['실내온수풀','풋살장','노래방'],extra:['온수풀 10만원','풋살장 2만원(1시간)','노래방 1만원(1시간)']},
{name:'클라우드나인',url:'https://goldenvalley.co.kr/rooms/P844723',price:'95만원',people:'15~20명',room:'5개 (침대5)',bath:'3개',floor:'2층',feature:'전 객실 침대 구성에 불멍이 가능한 숙소',img:'https://goldenvalley.co.kr/_next/image?q=75&url=https%3A%2F%2Fassets.goldenvalley.co.kr%2Fpensions%2F515a8592-6178-4546-bdb0-45d5ec72f4e2.jpg&w=3840',fac:['실내온수풀','불멍존','공용 족구장'],extra:['온수풀 10만원','바베큐 3만원','불멍 3만원','족구장 3만원(1시간)']},
{name:'비채35',url:'https://goldenvalley.co.kr/rooms/P679616',price:'95만원',people:'15~20명',room:'5개 (침대3, 온돌1, 키즈룸1)',bath:'3개',floor:'2층',feature:'키즈존이 있어 가족 모임에 어울리는 숙소',img:'https://goldenvalley.co.kr/_next/image?q=75&url=https%3A%2F%2Fassets.goldenvalley.co.kr%2Fpensions%2Fbde68c8d-beb3-4cac-93b5-336d8a67ea45.jpg&w=3840',fac:['실내온수풀','키즈존','공용 족구장'],extra:['온수풀 10만원','바베큐 이용료 안내 없음','족구장 3만원(1시간)']},
{name:'파란하늘',url:'https://goldenvalley.co.kr/rooms/P246407',price:'90만원',people:'15~20명',room:'5개 (침대3, 온돌2)',bath:'3개',floor:'2층',feature:'가격 부담이 적고 불멍까지 가능한 숙소',img:'https://goldenvalley.co.kr/_next/image?q=75&url=https%3A%2F%2Fassets.goldenvalley.co.kr%2Fpensions%2Fb25e5543-c56b-4711-9632-c52d2792c51f.jpg&w=3840',fac:['실내온수풀','불멍존','공용 족구장'],extra:['온수풀 10만원','바베큐 3만원','불멍 3만원','족구장 3만원(1시간)']},
{name:'블루블랑',url:'https://goldenvalley.co.kr/rooms/P429520',price:'105만원',people:'15~20명',room:'5개 (침대4, 복층1)',bath:'4개',floor:'3층(루프탑)',feature:'루프탑이 있는 감성 숙소',img:'https://goldenvalley.co.kr/_next/image?q=75&url=https%3A%2F%2Fassets.goldenvalley.co.kr%2Fpensions%2F2b984b14-1630-4038-a962-6e2a5841636c.jpg&w=3840',fac:['실내온수풀','루프탑'],extra:['온수풀 15만원','바베큐 숯 3만원']},
{name:'람사르',url:'https://goldenvalley.co.kr/rooms/P020202',price:'120만원',people:'20~20명',room:'5개 (침대3, 온돌2)',bath:'4개',floor:'3층',feature:'기준인원 20명으로 인원 계산이 단순한 숙소',img:'https://goldenvalley.co.kr/_next/image?q=75&url=https%3A%2F%2Fassets.goldenvalley.co.kr%2Fpensions%2Fd7c9e6b5-bce0-4d19-bb03-d007ddbfe03c.jpg&w=3840',fac:['실내온수풀','불멍존','공용 족구장'],extra:['온수풀 10만원','바베큐 3만원','불멍 3만원','족구장 3만원(1시간)']},
{name:'레미엘',url:'https://goldenvalley.co.kr/rooms/P986456',price:'100만원',people:'15~20명',room:'6개 (침대4, 온돌2)',bath:'4개',floor:'3층',feature:'객실 6개로 방 배정이 편한 숙소',img:'https://goldenvalley.co.kr/_next/image?q=75&url=https%3A%2F%2Fassets.goldenvalley.co.kr%2Fpensions%2Fa23d6172-4071-42b9-93cd-7760c669fb50.jpg&w=3840',fac:['실내온수풀','공용 족구장'],extra:['온수풀 10만원','가스그릴 바베큐 4만원','족구장 3만원(1시간)']}
];

const list=document.getElementById('list');
list.innerHTML=pensions.map((p)=>{
  const priceLabel=`기준 ${p.price}`;
  const roomCount=p.room.split(' ')[0];
  return `
  <details>
    <summary>
      <img class="thumb" src="${p.img}" alt="${p.name} 대표사진" loading="lazy">
      <div class="head">
        <div class="title-row">
          <h3>${p.name}</h3>
          <a class="room-link" href="${p.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">링크 : ${p.url}</a>
        </div>
        <p class="feature">${p.feature}</p>
        <div class="meta">
          <span class="price">${priceLabel}</span>
          <span>${p.people}</span>
          <span>객실 ${roomCount}</span>
          <span>욕실 ${p.bath}</span>
        </div>
      </div>
      <div class="chev" aria-hidden="true"></div>
    </summary>
    <div class="detail">
      <div class="grid">
        <div class="kv"><small>기준요금</small><b>${priceLabel}</b></div>
        <div class="kv"><small>기준/최대</small><b>${p.people}</b></div>
        <div class="kv"><small>객실</small><b>${p.room}</b></div>
        <div class="kv"><small>욕실/층수</small><b>${p.bath} / ${p.floor}</b></div>
      </div>
      <div class="cols">
        <div class="box"><h4>시설</h4><ul>${p.fac.map(x=>`<li>${x}</li>`).join('')}</ul></div>
        <div class="box"><h4>추가요금/특이사항</h4><ul>${p.extra.map(x=>`<li>${x}</li>`).join('')}</ul></div>
      </div>
    </div>
  </details>`;
}).join('');
</script>
</body>
</html>
